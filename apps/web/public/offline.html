<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Sin conexión — Fluvio</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      background: #180F2E;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 32px;
      text-align: center;
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #6447F5;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(100, 71, 245, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
    }
    p {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.55);
      max-width: 280px;
      line-height: 1.6;
    }
    button {
      margin-top: 8px;
      padding: 14px 28px;
      border-radius: 12px;
      border: none;
      background: #6447F5;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="logo">FLUVIO</div>
  <div class="icon">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#6447F5" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 6l5 5 5-5" />
      <path d="M6 11V3" />
      <path d="M13 18l5 5 5-5" />
      <path d="M18 23v-8" />
      <path d="M7 18h4a4 4 0 0 0 0-8h-1" />
    </svg>
  </div>
  <h1>Sin conexión</h1>
  <p>Revisa tu Wi-Fi o datos móviles e intenta de nuevo.</p>
  <button onclick="location.reload()">Reintentar</button>
</body>
</html>
