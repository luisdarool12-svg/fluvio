<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { margin: 0; background: var(--surface); padding: 20px; font-family: var(--font-ui); }
    .swatches { display: flex; gap: 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--line); }
    .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; }
    .sw .name { font-size: 12px; font-weight: 600; }
    .sw .hex { font-size: 11px; font-family: var(--font-display); font-weight: 700; letter-spacing: .02em; opacity: .85; }
  </style>
</head>
<body>
  <div class="swatches">
    <div class="sw" style="background:#5235E0;color:#fff"><span class="name">Violet ink</span><span class="hex">#5235E0</span></div>
    <div class="sw" style="background:#6447F5;color:#fff"><span class="name">Violet · primary</span><span class="hex">#6447F5</span></div>
    <div class="sw" style="background:#9B8CF8;color:#fff"><span class="name">Violet med</span><span class="hex">#9B8CF8</span></div>
    <div class="sw" style="background:#EDE9FE;color:#5B21B6"><span class="name">Violet light</span><span class="hex">#EDE9FE</span></div>
    <div class="sw" style="background:#5B21B6;color:#fff"><span class="name">Violet dark</span><span class="hex">#5B21B6</span></div>
  </div>
</body>
</html>
