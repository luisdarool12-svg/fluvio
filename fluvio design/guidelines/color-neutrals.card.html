<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals — Plum & Margen" subtitle="Deep Plum #180F2E (never pure black) · warm surfaces (never pure white)" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { margin: 0; background: var(--surface); padding: 20px; font-family: var(--font-ui); }
    .swatches { display: flex; gap: 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--line); }
    .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; }
    .sw .name { font-size: 12px; font-weight: 600; }
    .sw .hex { font-size: 11px; font-family: var(--font-display); font-weight: 700; letter-spacing: .02em; opacity: .85; }
  </style>
</head>
<body>
  <div class="swatches">
    <div class="sw" style="background:#180F2E;color:#fff"><span class="name">Plum · Fondo</span><span class="hex">#180F2E</span></div>
    <div class="sw" style="background:#241838;color:#fff"><span class="name">Plum soft</span><span class="hex">#241838</span></div>
    <div class="sw" style="background:#9487B0;color:#fff"><span class="name">Niebla · mist</span><span class="hex">#9487B0</span></div>
    <div class="sw" style="background:#FAF9F5;color:#180F2E;border-right:1px solid var(--line)"><span class="name">Margen · bg</span><span class="hex">#FAF9F5</span></div>
    <div class="sw" style="background:#FFFFFF;color:#180F2E"><span class="name">White · card</span><span class="hex">#FFFFFF</span></div>
    <div class="sw" style="background:#EAE6F2;color:#4E4566"><span class="name">Line</span><span class="hex">#EAE6F2</span></div>
  </div>
</body>
</html>
