<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation — border first" subtitle="Cards = 1px border, no shadow. Shadows only for overlays." -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { margin: 0; background: var(--bg); padding: 24px; font-family: var(--font-ui); }
    .row { display: flex; gap: 18px; align-items: stretch; }
    .card2 { flex: 1; background: var(--surface); border-radius: 12px; padding: 16px; }
    .t { font-weight: 600; font-size: 13px; color: var(--ink); }
    .d { font-size: 11.5px; color: var(--ink-3); margin-top: 3px; }
    .b1 { border: 1px solid var(--line); }
    .b2 { border: 1px solid var(--line); box-shadow: var(--shadow-pop); }
    .b3 { border: 1px solid var(--line); box-shadow: var(--shadow-overlay); }
  </style>
</head>
<body>
  <div class="row">
    <div class="card2 b1"><div class="t">Resting</div><div class="d">Cards, panels — border only, no shadow.</div></div>
    <div class="card2 b2"><div class="t">Pop</div><div class="d">Menus, popovers — soft lift.</div></div>
    <div class="card2 b3"><div class="t">Overlay</div><div class="d">Drawers, dialogs — deep shadow.</div></div>
  </div>
</body>
</html>
