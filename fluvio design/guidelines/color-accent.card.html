<!-- @dsCard group="Colors" viewport="700x150" name="Accent — Coral" subtitle="Corriente #FF6A38. The action color — CTAs, alerts. Use sparingly." -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { margin: 0; background: var(--surface); padding: 20px; font-family: var(--font-ui); }
    .swatches { display: flex; gap: 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--line); }
    .sw { flex: 1; height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; }
    .sw .name { font-size: 12px; font-weight: 600; }
    .sw .hex { font-size: 11px; font-family: var(--font-display); font-weight: 700; letter-spacing: .02em; opacity: .85; }
  </style>
</head>
<body>
  <div class="swatches">
    <div class="sw" style="background:#EC5524;color:#fff"><span class="name">Coral ink</span><span class="hex">#EC5524</span></div>
    <div class="sw" style="background:#FF6A38;color:#fff"><span class="name">Coral · action</span><span class="hex">#FF6A38</span></div>
    <div class="sw" style="background:#C2410C;color:#fff"><span class="name">Coral dark · text</span><span class="hex">#C2410C</span></div>
    <div class="sw" style="background:#FFEDD5;color:#C2410C"><span class="name">Coral light</span><span class="hex">#FFEDD5</span></div>
  </div>
</body>
</html>
