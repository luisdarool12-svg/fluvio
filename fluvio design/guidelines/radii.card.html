<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="Badges 6 · controls 9 · buttons 10 · cards 12–14 · hero 20" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { margin: 0; background: var(--surface); padding: 24px; font-family: var(--font-ui); }
    .row { display: flex; align-items: flex-end; gap: 20px; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 9px; }
    .box { width: 72px; height: 56px; background: var(--violet-light); border: 1px solid #DCD3FB; }
    .t { font-size: 11px; color: var(--ink-2); font-weight: 500; }
    .v { font-family: var(--font-display); font-weight: 700; font-size: 12px; color: var(--ink-3); }
  </style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:var(--r-xs)"></div><span class="t">badge</span><span class="v">6px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--r-sm)"></div><span class="t">control</span><span class="v">9px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--r)"></div><span class="t">button</span><span class="v">10px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--r-md)"></div><span class="t">card</span><span class="v">12px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--r-lg)"></div><span class="t">card+</span><span class="v">14px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--r-xl)"></div><span class="t">hero</span><span class="v">20px</span></div>
    <div class="item"><div class="box" style="border-radius:var(--r-pill)"></div><span class="t">pill</span><span class="v">999</span></div>
  </div>
</body>
</html>
