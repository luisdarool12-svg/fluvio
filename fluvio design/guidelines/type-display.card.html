<!-- @dsCard group="Type" viewport="700x230" name="Display — Syne" subtitle="Page titles, section heads, metric numbers. Weights 700 / 800." -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { margin: 0; background: var(--surface); padding: 24px; font-family: var(--font-display); color: var(--ink); }
    .stack { display: flex; flex-direction: column; gap: 16px; }
    .line { display: flex; align-items: baseline; gap: 14px; }
    .meta { font-family: var(--font-ui); font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); width: 130px; flex: none; }
    .h1 { font-weight: 800; font-size: 28px; letter-spacing: -.01em; }
    .h2 { font-weight: 700; font-size: 18px; letter-spacing: .005em; }
    .metric { font-weight: 800; font-size: 36px; letter-spacing: -.01em; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div class="stack">
    <div class="line"><span class="meta">H1 · 800 · 28</span><span class="h1">Buenas tardes, Luis</span></div>
    <div class="line"><span class="meta">H2 · 700 · 18</span><span class="h2">Próximas reservas</span></div>
    <div class="line"><span class="meta">Metric · 800 · 36</span><span class="metric">10</span><span class="metric" style="color:var(--violet)">320</span><span class="metric" style="color:var(--coral)">92%</span></div>
  </div>
</body>
</html>
