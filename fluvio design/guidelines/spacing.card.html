<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4 · 8 · 12 · 16 · 20 · 24 · 32 · 40 — 4px base grid" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../styles.css" />
  <style>
    body { margin: 0; background: var(--surface); padding: 24px; font-family: var(--font-ui); }
    .row { display: flex; align-items: flex-end; gap: 16px; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .bar { background: var(--coral); border-radius: 3px; width: 100%; }
    .cell { width: 40px; display: flex; flex-direction: column; align-items: center; gap: 8px; justify-content: flex-end; }
    .v { font-family: var(--font-display); font-weight: 700; font-size: 12px; color: var(--ink-3); }
  </style>
</head>
<body>
  <div class="row">
    <div class="cell"><div class="bar" style="height:4px"></div><span class="v">4</span></div>
    <div class="cell"><div class="bar" style="height:8px"></div><span class="v">8</span></div>
    <div class="cell"><div class="bar" style="height:12px"></div><span class="v">12</span></div>
    <div class="cell"><div class="bar" style="height:16px"></div><span class="v">16</span></div>
    <div class="cell"><div class="bar" style="height:20px"></div><span class="v">20</span></div>
    <div class="cell"><div class="bar" style="height:24px"></div><span class="v">24</span></div>
    <div class="cell"><div class="bar" style="height:32px"></div><span class="v">32</span></div>
    <div class="cell"><div class="bar" style="height:40px"></div><span class="v">40</span></div>
  </div>
</body>
</html>
