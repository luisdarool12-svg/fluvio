<!-- @dsCard group="Components" viewport="700x290" name="Card & StatCard" subtitle="Border-only surfaces + KPI metric tiles with trend / ring" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../styles.css" />
  <style>
    body { margin: 0; background: var(--bg); padding: 22px; font-family: var(--font-ui); }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 16px; }
    h2 { font-family: var(--font-display); font-weight: 700; font-size: 18px; color: var(--ink); margin: 0 0 4px; letter-spacing: -.01em; }
    .muted { color: var(--ink-3); font-size: 13.5px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Card, StatCard } = window.DesignSystem_578428;
    const ic = (d) => (<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">{d}</svg>);
    const Cal = () => ic(<><rect x="3" y="4.5" width="18" height="16" rx="2.5"/><path d="M3 9h18M8 2.5v4M16 2.5v4"/></>);
    const Check = () => ic(<path d="M5 12.5l4.2 4.2L19 7"/>);
    const X = () => ic(<path d="M6 6l12 12M18 6L6 18"/>);
    const UserPlus = () => ic(<><circle cx="9" cy="8" r="3.4"/><path d="M3.5 20a6 6 0 0 1 11 0M18 8v6M15 11h6"/></>);
    function Demo() {
      return (
        <div>
          <div className="grid">
            <StatCard icon={<Cal/>} label="Reservas hoy" value="10" trend="+18% vs. ayer" trendDir="up" />
            <StatCard icon={<Check/>} label="Confirmadas" ring={70} />
            <StatCard icon={<X/>} label="No-shows del mes" value="4" trend="−61% vs. abril" trendDir="up" />
            <StatCard icon={<UserPlus/>} label="Clientes nuevos" value="12" trend="esta semana" trendDir="flat" />
          </div>
          <Card>
            <h2>Próximas reservas</h2>
            <p className="muted">Elevación = borde, nunca sombra. Radio 12px.</p>
          </Card>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
