<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>

  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Button } = window.DesignSystem_578428;
    const Plus = () => (<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M12 5v14M5 12h14"/></svg>);
    const Spark = () => (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l1.6 4.8L18 9.4l-4.4 1.6L12 16l-1.6-5L6 9.4l4.4-1.6z"/></svg>);
    function Demo() {
      return (
        <div>
          <div className="row"><span className="lbl">Variants</span>
            <Button variant="primary" icon={<Plus/>}>Nueva reservación</Button>
            <Button variant="violet">Aplicar filtros</Button>
            <Button variant="soft" icon={<Spark/>}>Mejorar plan</Button>
            <Button variant="ghost">Cancelar</Button>
            <Button variant="subtle">Ver más</Button>
            <Button variant="danger">Eliminar</Button>

          <div className="row"><span className="lbl">Sizes</span>
            <Button variant="primary" size="sm">Small</Button>
            <Button variant="primary" size="md">Medium</Button>
            <Button variant="primary" size="lg" icon={<Plus/>}>Large</Button>
          </div>
          <div className="row"><span className="lbl">Icon-only & states</span>
            <Button variant="soft" icon={<Plus/>} aria-label="Add" />
            <Button variant="violet" icon={<Spark/>} aria-label="Spark" />
            <Button variant="primary" disabled>Disabled</Button>
            <Button variant="primary" block style={{ maxWidth: 220 }} icon={<Plus/>}>Block</Button>
