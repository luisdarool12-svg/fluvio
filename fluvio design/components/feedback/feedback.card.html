<!-- @dsCard group="Components" viewport="700x200" name="Badge & Avatar" subtitle="Reservation status pills + initials avatars (VIP ring)" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../styles.css" />
  <style>
    body { margin: 0; background: var(--surface); padding: 22px; font-family: var(--font-ui); }
    .row { display: flex; flex-wrap: wrap; align-items: center; gap: 12px; margin-bottom: 18px; }
    .row:last-child { margin-bottom: 0; }
    .lbl { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); width: 100%; margin: 0 0 9px; font-weight: 500; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Badge, Avatar } = window.DesignSystem_578428;
    function Demo() {
      return (
        <div>
          <div className="row"><span className="lbl">Reservation status</span>
            <Badge status="confirmada" />
            <Badge status="pendiente" />
            <Badge status="sentada" />
            <Badge status="no_show" />
            <Badge status="cancelada" />
          </div>
          <div className="row"><span className="lbl">Avatars</span>
            <Avatar name="Sofía Mendoza" size={40} />
            <Avatar name="Ricardo Beltrán" size={40} />
            <Avatar name="María Fernanda Ríos" size={40} vip />
            <Avatar name="Laura Beristáin" size={34} />
            <Avatar name="Tomás Quirós" size={28} />
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
