<!-- @dsCard group="Brand" viewport="700x230" name="Logo" subtitle="Three-wave mark + FLUVIO lockup · color and mono on dark" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../styles.css" />
  <style>
    body { margin: 0; padding: 0; font-family: var(--font-ui); }
    .wrap { display: grid; grid-template-columns: 1fr 1fr; }
    .panel { padding: 30px 26px; display: flex; flex-direction: column; gap: 22px; justify-content: center; }
    .light { background: var(--bg); }
    .dark { background: var(--plum); }
    .cap { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; font-weight: 500; }
    .cap.l { color: var(--ink-3); }
    .cap.d { color: rgba(255,255,255,.4); }
    .lockup { display: flex; align-items: center; gap: 26px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Logo } = window.DesignSystem_578428;
    function Demo() {
      return (
        <div className="wrap">
          <div className="panel light">
            <span className="cap l">Light · color</span>
            <Logo size={34} wordmark />
            <div className="lockup"><Logo size={30} /><Logo size={22} /></div>
          </div>
          <div className="panel dark">
            <span className="cap d">Dark · mono</span>
            <Logo size={34} variant="mono" wordmark />
            <div className="lockup"><Logo size={30} variant="mono" /><Logo size={22} variant="mono" /></div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
