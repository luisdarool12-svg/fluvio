<!-- @dsCard group="Components" viewport="700x230" name="Input · Switch · Chip" subtitle="Labeled fields, violet toggle, and filter-tab chips" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="../../styles.css" />
  <style>
    body { margin: 0; background: var(--surface); padding: 22px; font-family: var(--font-ui); }
    .row { display: flex; flex-wrap: wrap; align-items: center; gap: 14px; margin-bottom: 18px; }
    .row:last-child { margin-bottom: 0; }
    .lbl { font-size: 10px; letter-spacing: .1em; text-transform: uppercase; color: var(--ink-3); width: 100%; margin: 0 0 9px; font-weight: 500; }
    .toggle-row { display: flex; align-items: center; gap: 10px; font-size: 13.5px; color: var(--ink-2); font-weight: 500; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { Input, Switch, Chip } = window.DesignSystem_578428;
    const { useState } = React;
    const Search = () => (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>);
    function Demo() {
      const [on, setOn] = useState(true);
      const [on2, setOn2] = useState(false);
      const [tab, setTab] = useState('todos');
      const tabs = [['todos','Todos'],['pend','Pendientes'],['conf','Confirmadas'],['no','No-show']];
      return (
        <div>
          <div className="row">
            <div style={{ width: 240 }}><Input label="Nombre del cliente" placeholder="Sofía Mendoza" /></div>
            <div style={{ width: 230 }}><Input label="Buscar" icon={<Search/>} placeholder="Buscar reservas…" /></div>
          </div>
          <div className="row"><span className="lbl">Filter tabs</span>
            {tabs.map(([k,l]) => <Chip key={k} active={tab===k} onClick={() => setTab(k)}>{l}</Chip>)}
          </div>
          <div className="row"><span className="lbl">Switch</span>
            <span className="toggle-row"><Switch checked={on} onChange={setOn} /> Bot de WhatsApp activo</span>
            <span className="toggle-row"><Switch checked={on2} onChange={setOn2} /> Recordatorios SMS</span>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
